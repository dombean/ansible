# Installed as the invoking user (no become) so ~/.cargo is owned by them.
- name: Install Rust and Cargo
  shell: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
  args:
    creates: "{{ ansible_env.HOME }}/.cargo/bin/cargo"

# DO NOT change `yazi-build` to `yazi-fm`/`yazi-cli`. The yazi maintainers
# publish a dedicated `yazi-build` meta-crate, and building yazi-fm/yazi-cli
# directly from crates.io panics by design ("must be built with
# `cargo install --force yazi-build`"). Verified by CI failure 2026-05-23.
- name: Install yazi
  shell: cargo install --force yazi-build
  args:
    creates: "{{ ansible_env.HOME }}/.cargo/bin/yazi"
  environment:
    PATH: "{{ ansible_env.HOME }}/.cargo/bin:{{ ansible_env.PATH }}"

- name: Install fd-find
  shell: cargo install fd-find
  args:
    creates: "{{ ansible_env.HOME }}/.cargo/bin/fd"
  environment:
    PATH: "{{ ansible_env.HOME }}/.cargo/bin:{{ ansible_env.PATH }}"
