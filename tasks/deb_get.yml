# force: yes discards local changes and the git module updates to the latest
# default-branch commit on re-run, so a separate reset/pull is unnecessary.
- name: Clone deb-get repository
  become: true
  git:
    repo: "https://github.com/wimpysworld/deb-get.git"
    dest: "/tmp/deb-get"
    clone: yes
    force: yes

- name: Run make install
  become: true
  make:
    chdir: /tmp/deb-get/docs/
    target: install

- name: Update deb-get
  become: false
  shell: deb-get update 2>/dev/null || true

- name: Install Software
  become: true
  shell: deb-get install standard-notes bitwarden whatsapp-for-linux spotify-client brave-browser code rstudio veracrypt indicator-sound-switcher protonvpn 2>/dev/null || true
